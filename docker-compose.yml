version: '3.8'

services:
  postgres:
    image: postgres:16-bullseye
    container_name: marketplace-postgres
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGTZ: UTC   # ← timezone del servidor postgres
      TZ: UTC     # ← timezone del contenedor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c timezone=UTC
      -c log_timezone=UTC
      

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # ← activa la persistencia para que si el contenedor se reinicia no pierdas el cache.


  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: marketplace-rabbitmq
    ports:
      - "5672:5672"     # ← puerto para la conexión AMQP
      - "15672:15672"   # ← puerto para el panel de administración web
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  localstack:
    image: localstack/localstack:4.6.0
    container_name: marketplace-localstack
    ports:
      - "4566:4566" # ← puerto único para todos los servicios de AWS simulados
    environment:
      - SERVICES=sqs # ← le dice a LocalStack que solo levante el servicio de SQS
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  vault:
    image: hashicorp/vault:1.20.3
    container_name: marketplace-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot  # ← arranca Vault en modo desarrollo con un token fijo myroot. En producción nunca usarías esto, pero para desarrollo local es perfecto porque no necesitás inicializar ni unseal Vault manualmente.
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK  # ←  es necesario para que Vault pueda bloquear memoria y evitar que los secretos se escriban en el swap del sistema operativo.
    volumes:
      - vault_data:/vault/Data

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  localstack_data:
  vault_data: