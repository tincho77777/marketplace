version: '3.8'

services:
  postgres:
    image: postgres:16-bullseye
    container_name: marketplace-postgres
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGTZ: UTC
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c timezone=UTC
      -c log_timezone=UTC

volumes:
  postgres_data: